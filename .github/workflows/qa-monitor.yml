name: Nightly QA Auto-Monitor

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npm exec playwright -- install --with-deps chromium

      - name: Execute QA Suite
        id: playwright_test
        run: |
          rm -rf allure-results allure-report
          npm exec playwright -- test
        continue-on-error: true

      - name: Load Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        if: always()

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-history

      - name: Deploy Health Dashboard
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()

      - name: Discord Alert on Failure
        if: always() && steps.playwright_test.outcome == 'failure'
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"🚨 **QA Monitor: Test Failures Detected!** \nView Live Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/\"}" \
               "$WEBHOOK_URL"
