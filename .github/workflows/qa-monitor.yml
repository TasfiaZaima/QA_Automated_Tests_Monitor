name: Nightly QA Auto-Monitor

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install # Changed from npm ci for better stability

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Execute QA Suite
        run: npx playwright test
        continue-on-error: true

      - name: Load Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Health Dashboard
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Discord Alert on Failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: DISCORD_WEBHOOK is empty. Check your GitHub Secrets."
            exit 1
          fi
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"🚨 **QA Monitor Failure Detected!** \nView Live Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/\"}" \
               "$WEBHOOK_URL"